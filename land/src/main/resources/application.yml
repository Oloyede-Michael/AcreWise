server:
  port: ${PORT:8080}

grpc:
  server:
    port: ${GRPC_PORT:9090}
    health:
      service:
        enabled: false

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

spring:
  application:
    name: land

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.tozpptsgpodiwnsyxzde}
    password: ${SPRING_DATASOURCE_PASSWORD:A0ZwvI5DKYgFeSPs}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        preparedStatementCacheQueries: 0
        preparedStatementCacheSqlLimit: 0
        sslmode: require
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      url: ${REDIS_URL:rediss://default:gQAAAAAAAan-AAIgcDE5NGMwMWJiY2Q0NDU0YWFjYjFkNzllYTY4YzVhMWM0Mw@champion-koi-109054.upstash.io:6379}
      ssl:
        enabled: true

nomba:
  api:
    base-url: ${NOMBA_BASE_URL:https://api.nomba.com}
    account-id: ${NOMBA_ACCOUNT_ID:}
    client-key: ${NOMBA_CLIENT_KEY:}
    secret-key: ${NOMBA_SECRET_KEY:}
    sub-account-id: ${NOMBA_SUB_ACCOUNT_ID:}
