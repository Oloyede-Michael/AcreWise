server:
  port: ${PORT:8080}

spring:
  application:
    name: land

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        preparedStatementCacheQueries: 0
        preparedStatementCacheSqlLimit: 0
        sslmode: require
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true

nomba:
  api:
    base-url: ${NOMBA_BASE_URL}
    account-id: ${NOMBA_ACCOUNT_ID}
    client-key: ${NOMBA_CLIENT_KEY}
    secret-key: ${NOMBA_SECRET_KEY}
    sub-account-id: ${NOMBA_SUB_ACCOUNT_ID}
