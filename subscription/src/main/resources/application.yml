spring:
  application:
    name: reflow
  
  # Configure local PostgreSQL connection details
  datasource:
    url: jdbc:postgresql://localhost:5432/autocollect_db
    username: postgres
    password: postgres # <-- Ensure this matches your local system pass
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Configure Redis connectivity parameters
  data:
    redis:
      host: localhost
      port: 6379

